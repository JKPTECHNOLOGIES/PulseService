services:
  db:
    image: postgres:16-alpine
    container_name: pulseservice-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulseservice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulseservice}
      POSTGRES_DB: ${POSTGRES_DB:-pulseservice}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-pulseservice} -d ${POSTGRES_DB:-pulseservice}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    image: pulseservice-backend
    container_name: pulseservice-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://pulseservice:pulseservice@db:5432/pulseservice?schema=public}
      JWT_SECRET: ${JWT_SECRET:-pulseservice-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      # Microsoft Graph mail (app-only OAuth2) — takes priority over SMTP_* below
      MS_TENANT_ID: ${MS_TENANT_ID:-}
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET:-}
      MS_MAIL_FROM: ${MS_MAIL_FROM:-}
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      # Use 127.0.0.1 (not localhost): the server binds IPv4 0.0.0.0, while
      # `localhost` resolves to IPv6 ::1 first inside the container and is refused.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    image: pulseservice-frontend
    container_name: pulseservice-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres-data:
