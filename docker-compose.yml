services:
  db:
    image: postgres:16-alpine
    container_name: pulseservice-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulseservice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulseservice}
      POSTGRES_DB: ${POSTGRES_DB:-pulseservice}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-pulseservice} -d ${POSTGRES_DB:-pulseservice}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    image: pulseservice-backend
    container_name: pulseservice-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:-postgresql://pulseservice:pulseservice@db:5432/pulseservice?schema=public}
      JWT_SECRET: ${JWT_SECRET:-pulseservice-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    image: pulseservice-frontend
    container_name: pulseservice-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres-data:
