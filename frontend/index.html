<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/logo.svg" />
        <!-- viewport-fit=cover is required for CSS env(safe-area-inset-*) to
             report real values on notched devices. Zoom is intentionally left
             enabled (no maximum-scale) for accessibility. -->
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <meta name="theme-color" content="#2563eb" />
        <!-- iOS standalone (Add to Home Screen) app metadata -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="PulseService" />
        <title>PulseService - Field Service Management</title>
        <!-- Apply the saved (or system) theme before first paint to avoid a
             flash of the wrong color scheme. -->
        <script>
            (function () {
                try {
                    var p = localStorage.getItem("theme") || "system";
                    var dark =
                        p === "dark" ||
                        (p === "system" &&
                            window.matchMedia("(prefers-color-scheme: dark)")
                                .matches);
                    document.documentElement.classList.toggle("dark", dark);
                } catch (e) {}
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
